config-version: 2

name: "dbt_jaffle_shop"
version: "3.0.0"
require-dbt-version: ">=1.5.0"

dbt-cloud:
  project-id: 275557

profile: default

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["data-tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  "dbt_date:time_zone": "America/Los_Angeles"

seeds:
  dbt_jaffle_shop:
    +schema: bronze
    jaffle-data:
      +enabled: "{{ var('load_source_data', false) }}"

models:
  dbt_jaffle_shop:
    staging:
      +materialized: view
      +schema: "{{ 'silver' if target.name == 'prod' else 'dev_silver_' ~ target.name }}"
    marts:
      +materialized: table
      +schema: "{{ 'gold' if target.name == 'prod' else 'dev_gold_' ~ target.name }}"