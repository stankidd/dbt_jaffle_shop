models:
  - name: orders
    description: Order overview data mart, offering key details for each order inlcluding if it's a customer's first order and a food vs. drink item breakdown. One row per order.
    agg_time_dimension: ordered_at
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_items_subtotal = subtotal"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_total = subtotal + tax_paid"
    semantic_model:
      enabled: true
    metrics:
      - name: order_total
        description: Sum of total order amonunt. Includes tax + revenue.
        label: Order Total
        type: simple
        agg: sum
        expr: order_total
      - name: order_cost
        description: Sum of cost for each order item.
        label: Order Cost
        type: simple
        agg: sum
        expr: order_cost
      - name: orders
        description: Count of orders.
        label: Orders
        type: simple
        agg: sum
        expr: 1
      - name: new_customer_orders
        description: New customer's first order count
        label: New Customers
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__customer_order_number') }} = 1
      - name: large_orders
        description: "Count of orders with order total over 20."
        label: Large Orders
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__order_total_dim') }} >= 20
      - name: food_orders
        description: Count of orders that contain food order items
        label: Food Orders
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__is_food_order') }} = true
      - name: drink_orders
        description: Count of orders that contain drink order items
        label: Drink Orders
        type: simple
        agg: sum
        expr: 1
        filter: |
          {{ Dimension('order_id__is_drink_order') }} = true
      - name: tax_paid
        description: The total tax paid on each order.
        type: simple
        agg: sum
        expr: tax_paid
    columns:
      - name: order_id
        description: The unique key of the orders mart.
        entity:
          type: primary
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: The foreign key relating to the customer who placed the order.
        entity:
          type: foreign
          name: customer
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: location_id
        entity:
          type: foreign
          name: location
      - name: order_total
        description: The total amount of the order in USD including tax.
        dimension:
          type: categorical
          name: order_total_dim
      - name: ordered_at
        description: The timestamp the order was placed at.
        granularity: day
        dimension:
          type: time
      - name: order_cost
        description: The sum of supply expenses to fulfill the order.
      - name: is_food_order
        description: A boolean indicating if this order included any food items.
        dimension:
          type: categorical
      - name: is_drink_order
        description: A boolean indicating if this order included any drink items.
        dimension:
          type: categorical
      - name: customer_order_number
        dimension:
          type: categorical

unit_tests:
  - name: test_order_items_compute_to_bools_correctly
    description: "Test that the counts of drinks and food orders convert to booleans properly."
    model: orders
    given:
      - input: ref('order_items')
        rows:
          - {
              order_id: 1,
              order_item_id: 1,
              is_drink_item: false,
              is_food_item: true,
            }
          - {
              order_id: 1,
              order_item_id: 2,
              is_drink_item: true,
              is_food_item: false,
            }
          - {
              order_id: 2,
              order_item_id: 3,
              is_drink_item: false,
              is_food_item: true,
            }
      - input: ref('stg_orders')
        rows:
          - { order_id: 1 }
          - { order_id: 2 }
    expect:
      rows:
        - {
            order_id: 1,
            count_food_items: 1,
            count_drink_items: 1,
            is_drink_order: true,
            is_food_order: true,
          }
        - {
            order_id: 2,
            count_food_items: 1,
            count_drink_items: 0,
            is_drink_order: false,
            is_food_order: true,
          }

saved_queries:
  - name: order_metrics
    query_params:
      metrics:
        - orders
        - new_customer_orders
        - order_total
        - food_orders
        - drink_orders
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: order_metrics
        config:
          export_as: table
