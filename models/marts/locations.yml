models:
  - name: locations
    agg_time_dimension: opened_date
    semantic_model:
      enabled: true
    metrics:
      - name: average_tax_rate
        description: Average tax rate.
        type: simple
        agg: average
        expr: tax_rate
    columns:
      - name: location_id
        entity:
          type: primary
          name: location
      - name: location_name
        dimension:
          type: categorical
      - name: opened_date
        granularity: day
        dimension:
          type: time
