models:
  - name: int_order_items
    description: >
      Beriker ordre-linjer med produkt- og forsyningsinformasjon.
      Én rad per ordre-linje.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: int_orders
    description: >
      Beriker ordrer med aggregert informasjon fra ordre-linjer.
      Beregner mat/drikke-flagg og kundens ordrenummer.
      Én rad per ordre.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: int_customers
    description: >
      Beriker kunder med aggregert ordrehistorikk.
      Beregner livstidsbruk, antall ordrer og kundetype.
      Én rad per kunde.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
