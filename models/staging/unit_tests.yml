unit_tests:
  - name: test_add_days_works_correctly
    description: "Test that the add_days function works correctly."
    model: stg_orders
    given:
      - input: source('ecom', 'raw_orders')
        format: csv
        rows: |
          id,customer,ordered_at,store_id,subtotal,tax_paid,order_total
          a,a,2021-01-01T00:00:00,a,100,10,110
    expect:
      format: csv
      rows: |
        order_id,location_id,customer_id,subtotal_cents,tax_paid_cents,order_total_cents,subtotal,tax_paid,order_total,ordered_at,estimated_delivery_date
        a,a,a,100,10,110,1.00000000000000000000,0.10000000000000000000,1.1000000000000000,2021-01-01T00:00:00,2021-01-08T00:00:00